<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Almacén Neón en la Nube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Sistema de Almacén Web (En vivo)</h1>
        
        <div class="panel-control">
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Nombre del artículo (ej. Laptop)">
                <input type="text" id="categoria" placeholder="Categoría (ej. Electrónica)">
                <input type="number" id="cantidad" placeholder="Cantidad">
                <button onclick="agregarProducto()" class="btn-agregar">Agregar Artículo</button>
            </div>
            
            <div class="search-group">
                <input type="text" id="busqueda" placeholder="🔍 Buscar por nombre..." onkeyup="renderizar(window.inventarioGlobal)">
            </div>
        </div>

        <div class="table-container">
            <table id="tablaInventario">
                <thead>
                    <tr>
                        <th>Vista Previa</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Cantidad</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="historial-container">
            <h2>⏱️ Historial de Movimientos</h2>
            <ul id="historial"></ul>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="config.js"></script>

    <script src="script.js"></script>
</body>
</html>
